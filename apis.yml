aid: disclosure-requirements
name: Disclosure Requirements
description: >-
  Disclosure Requirements are the regulatory and legal obligations for
  organizations to reveal specific information to stakeholders, regulators,
  and the public. These requirements span financial disclosures (SEC, IFRS),
  sustainability and ESG reporting (CSRD, ESRS, IFRS S1/S2, TCFD, GRI, SASB),
  privacy notices (GDPR, CCPA), and corporate governance, helping ensure
  transparency and accountability across markets and jurisdictions.
